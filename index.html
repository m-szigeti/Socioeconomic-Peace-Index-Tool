<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Tool for Socio Economic Peace Index Tool</title>
    
    <!-- CSS styles -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/info_panel.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
  crossorigin=""/>
    
    <meta name="description" content="Interactive map visualization tool for socioeconomic and peace data">
    
    <!-- Critical inline styles -->
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        /* Fix for layout squishing - prevent flex-shrink on special sections */
        .sepi-section, .pillars-section {
            flex-shrink: 0 !important;
            min-height: auto !important;
        }
        
        /* Ensure dropdown containers don't interfere with button styling */
        .dropdown-container {
            flex-shrink: 1;
        }
        
        /* Override any conflicting flex properties */
        #sidebar > * {
            flex-shrink: 0;
        }
        
        #sidebar .layer-group {
            flex-shrink: 1;
        }
    </style>
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav id="navbar">
        <div class="navbar-logo navbar-logo-left">
            <img src="assets/pigeon2.png" alt="SDG AI Logo" class="logo-image_left">
        </div>
        <div class="navbar-logo navbar-logo-left">
            <h2 class="tool-title">Socio Economic Peace Index Tool</h2>
        </div>
        
        <ul class="navbar-menu">
            <li><a href="html/about.html" class="larger-nav-link">About Us</a></li>
        </ul>
        <div class="navbar-logo navbar-logo-right">
            <img src="assets/undp_logo.png" alt="UNDP Logo" class="logo-image_right">
        </div>
    </nav>

    <!-- Main container for sidebar and map -->
    <div class="main-container">
        <!-- Sidebar with layer controls -->
        <div id="sidebar">
            <!-- Layer controls will be generated by JavaScript templates -->
        </div>
        
        <!-- Statistics container -->
        <div id="stats-container" style="display: none; position: absolute; top: 10px; right: 10px; z-index: 1000; padding: 10px; background: white; border: 1px solid #ccc; border-radius: 5px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);"></div>
        
        <!-- Map container -->
        <div id="map"></div>
    </div>
 
    <!-- Legend -->
    <div id="legend" class="legend"></div>
    
    <!-- External library scripts -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js" 
  integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA==" 
  crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.15.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.sync@0.2.4/L.Map.Sync.min.js"></script>
    
    <!-- Application scripts - Using optimized main.js as entry point -->
    <script type="module" src="js/main.js"></script>
    
    <!-- Layer templates initialization -->
    <script type="module">
        import { LayerTemplates } from './js/layer-templates.js';
        import { populateColorRampSelector } from './js/layer_config.js';
        
        document.addEventListener('DOMContentLoaded', function() {
            // Generate layer controls using JavaScript templates
            const sidebar = document.getElementById('sidebar');
            if (sidebar) {
                sidebar.innerHTML = LayerTemplates.generateAllLayerControls();
            }
            
            // Initialize control event listeners
            initializeLayerControls();
            
            // Initialize color ramp selectors after DOM is ready
            initializeColorRampSelectors();
        });
        
        function initializeLayerControls() {
            // Hide all selectors initially
            document.querySelectorAll('.attribute-selector, .color-ramp-selector').forEach(function(elem) {
                elem.style.display = 'none';
            });
            
            // Setup layer control visibility handlers
            setupLayerControls('geojsonLayer');
            setupLayerControls('geojsonLayer2');
            setupPointControls();
            setupCombinedSEPIControls(); // NEW: Combined SEPI controls
            setupDropdownToggles();
            setupOpacityDisplays();
        }

        /**
         * Setup combined SEPI controls with mutually exclusive selection
         */
        function setupCombinedSEPIControls() {
            const sepiOptions = document.querySelectorAll('.sepi-option');
            const sepiOpacity = document.getElementById('sepiOpacity');
            const sepiOpacityValue = document.getElementById('sepiOpacityValue');
            
            if (sepiOptions.length === 0) return;
            
            // Set initial state - Overall Peace Index active by default
            const defaultOption = document.querySelector('.sepi-option[data-sepi-type="main"]');
            if (defaultOption) {
                defaultOption.classList.add('active');
                
                // Trigger SEPI layer loading
                setTimeout(() => {
                    const event = new CustomEvent('sepiOptionChanged', {
                        detail: { 
                            type: 'main',
                            pillarId: null 
                        },
                        bubbles: true
                    });
                    defaultOption.dispatchEvent(event);
                }, 500);
            }
            
            // Add click listeners to all SEPI options
            sepiOptions.forEach(option => {
                option.addEventListener('click', function() {
                    // Remove active class from all options
                    sepiOptions.forEach(opt => opt.classList.remove('active'));
                    
                    // Add active class to clicked option
                    this.classList.add('active');
                    
                    // Get option details
                    const type = this.getAttribute('data-sepi-type');
                    const pillarId = this.getAttribute('data-pillar-id');
                    
                    console.log(`SEPI option selected: ${type}${pillarId ? ` - ${pillarId}` : ''}`);
                    
                    // Dispatch custom event for layer manager to handle
                    const event = new CustomEvent('sepiOptionChanged', {
                        detail: { 
                            type: type,
                            pillarId: pillarId 
                        },
                        bubbles: true
                    });
                    this.dispatchEvent(event);
                });
            });
            
            // Setup opacity control for the entire SEPI section
            if (sepiOpacity && sepiOpacityValue) {
                sepiOpacity.addEventListener('input', function() {
                    const opacity = parseFloat(this.value);
                    sepiOpacityValue.textContent = `${Math.round(opacity * 100)}%`;
                    
                    // Dispatch opacity change event
                    const event = new CustomEvent('sepiOpacityChanged', {
                        detail: { opacity: opacity },
                        bubbles: true
                    });
                    this.dispatchEvent(event);
                });
            }
        }

        function setupLayerControls(layerId) {
            const checkbox = document.getElementById(layerId);
            const controlsContainer = checkbox?.closest('.layer-checkbox')?.nextElementSibling;
            
            if (checkbox && controlsContainer) {
                checkbox.addEventListener('change', function() {
                    // Show/hide the entire controls container
                    controlsContainer.style.display = this.checked ? 'block' : 'none';
                    
                    // Also show the attribute and color selectors within the container
                    const attributeSelector = controlsContainer.querySelector('.attribute-selector');
                    const colorSelector = controlsContainer.querySelector('.color-ramp-selector');
                    
                    if (this.checked) {
                        if (attributeSelector) attributeSelector.style.display = 'block';
                        if (colorSelector) colorSelector.style.display = 'block';
                    }
                });
            }
        }

        function setupPointControls() {
            const pointCheckbox = document.getElementById('pointLayer');
            const pointSelector = document.getElementById('pointValueSelector');
            const colorSelector = document.getElementById('pointColorRamp')?.parentElement;
            
            if (pointCheckbox && pointSelector) {
                pointSelector.parentElement.style.display = 'none';
                if (colorSelector) colorSelector.style.display = 'none';
                
                pointCheckbox.addEventListener('change', function() {
                    pointSelector.parentElement.style.display = this.checked ? 'block' : 'none';
                    if (colorSelector) colorSelector.style.display = this.checked ? 'block' : 'none';
                });
            }
        }

        function setupDropdownToggles() {
            document.querySelectorAll('.dropdown-btn').forEach(button => {
                button.addEventListener('click', function() {
                    this.classList.toggle('active');
                    
                    const container = this.nextElementSibling;
                    if (container && container.classList.contains('dropdown-container')) {
                        const isVisible = container.style.display === 'block';
                        container.style.display = isVisible ? 'none' : 'block';
                    }
                });
            });
        }

        function setupOpacityDisplays() {
            document.querySelectorAll('input[type="range"]').forEach(slider => {
                const displayId = slider.id.replace('Opacity', 'OpacityValue');
                const display = document.getElementById(displayId);
                
                if (display) {
                    const updateDisplay = () => {
                        const value = Math.round(slider.value * 100);
                        display.textContent = `${value}%`;
                    };
                    
                    updateDisplay(); // Initial value
                    slider.addEventListener('input', updateDisplay);
                }
            });
        }

        function initializeColorRampSelectors() {
            // Only initialize color ramp selectors that actually exist and are needed
            const colorRampSelectors = [
                'vectorColorRamp1',    // Subnational (Regional) Statistics
                'vectorColorRamp2',    // Subnational (District) Statistics  
                'pointColorRamp',      // DHS Statistics
                'pointColorRamp2'      // Cities
            ];
            
            colorRampSelectors.forEach(selectorId => {
                const selector = document.getElementById(selectorId);
                if (selector) {
                    populateColorRampSelector(selectorId);
                    console.log(`Populated color ramp selector: ${selectorId}`);
                } else {
                    console.warn(`Color ramp selector not found: ${selectorId}`);
                }
            });
            
            console.log('Color ramp selectors initialized (minimal set)');
        }
    </script>
</body>
</html>
